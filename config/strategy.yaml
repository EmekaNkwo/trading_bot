strategy:
  name: xau_trend
  ema_fast: 50
  ema_slow: 200
  atr:
    period: 14
    sl_multiplier: 1.5
    tp_multiplier: 2.0
    rr_ratio: 1.5
  # Lower = more trades (but more noise). Start at 20 for evaluation.
  min_adx: 20
  adx_period: 14
  rsi_period: 14
  rsi_buy_max: 65
  rsi_sell_min: 35
  # Allow larger distance from EMAs before blocking (more entries in strong trends)
  max_ema_distance_atr: 2.5
  # More trades if false (keep true if you prefer cleaner sessions)
  block_asian_session: true

scalper:
  ema_period: 20
  bb_period: 20
  bb_std: 2.0
  atr_period: 14
  sl_atr: 1.5
  tp_atr: 1.5  # Tighter TP for scalper (1.5x ATR for quick profits)
  min_candles: 50
  # Wider spread allowance = more trades but riskier fills
  max_spread_points: 50
  trailing_stop: true
  trailing_atr_multiplier: 1.0
  trailing_step: 0.5

regime:
  # Adaptive multi-regime strategy (more opportunities)
  atr_period: 14
  adx_period: 14
  ema_fast: 20
  ema_slow: 80
  bb_period: 20
  bb_std: 2.0
  squeeze_lookback: 120
  squeeze_pct: 0.2
  volume_lookback: 20
  volume_mult: 1.2
  trend_adx: 22
  meanrev_adx_max: 18
  mr_rsi_buy: 35
  mr_rsi_sell: 65
  sl_atr_trend: 1.6
  tp_atr_trend: 2.0
  sl_atr_breakout: 1.8
  tp_atr_breakout: 2.2
  sl_atr_meanrev: 1.3
  tp_atr_meanrev: 1.7
  # Enforced at execution time (TP will be pushed outward if needed)
  min_rr: 1.2
  min_bars_between_signals: 3
  block_asian_session: true
  block_on_recent_sweep: true
  recent_sweep_block_minutes: 15
  recent_sweep_log_details: true

sweep:
  # Liquidity sweep dual-mode strategy (fade vs continuation)
  atr_period: 14
  adx_period: 14
  rsi_period: 7

  # Liquidity map (levels -> clustered bands)
  swing_left: 3
  swing_right: 3
  swing_lookback_bars: 800
  swing_max_levels: 40
  cluster_atr_mult: 0.12

  # Sweep detection
  sweep_min_atr: 0.12
  reclaim_bars: 4
  accept_bars: 1

  # Mode selection filters
  fade_adx_max: 26
  cont_adx_min: 22
  cont_body_atr_mult: 0.35
  wick_reject_ratio: 0.45
  rsi_oversold: 30
  rsi_overbought: 70

  # Risk model (SL/TP in ATR)
  sl_buffer_atr: 0.10
  tp_fade_atr: 0.90
  tp_cont_atr: 1.20
  # Enforced at execution time (TP will be pushed outward if needed)
  min_rr_fade: 1.15
  min_rr_cont: 1.25

  # Throttles (reduce overtrading)
  min_bars_between_signals: 1
  cooldown_minutes: 10
  band_key_step: 0.5

market_state:
  atr_period: 14
  atr_median_lookback: 120
  high_vol_mult: 1.35
  low_vol_mult: 0.75
  sweep_lookback_bars: 48
  sweep_atr_mult: 0.20
  london_open_hour_utc: 8
  opening_range_minutes: 30

liquidity_reclaim:
  atr_period: 14
  recent_sweep_minutes: 45
  reclaim_buffer_atr: 0.05
  wick_reject_ratio: 0.45
  sl_buffer_atr: 0.20
  rr_target: 1.60
  min_bars_between_signals: 2
  require_active_session: true
  block_high_vol: false

opening_range_displacement:
  atr_period: 14
  break_buffer_atr: 0.08
  min_body_atr: 0.30
  max_extension_atr: 1.20
  sl_buffer_atr: 0.25
  rr_target: 1.70
  require_active_session: true
  require_non_low_vol: false
  min_bars_between_signals: 2

multi_asset_regime:
  # Symbol-agnostic strategy for indices/crypto with per-symbol overrides.
  atr_period: 14
  adx_period: 14
  rsi_period: 14
  ema_fast: 20
  ema_slow: 80

  # Regime thresholds
  trend_adx_min: 24
  meanrev_adx_max: 18
  trend_rsi_buy_max: 62
  trend_rsi_sell_min: 38
  mr_rsi_buy: 28
  mr_rsi_sell: 72

  # Risk model
  sl_atr_trend: 1.6
  tp_atr_trend: 2.2
  sl_atr_meanrev: 1.3
  tp_atr_meanrev: 1.8
  min_rr: 1.2
  min_bars_between_signals: 3

  # Session model:
  # - london_newyork: trade during LDN/NY windows
  # - 24x7: trade all day (for crypto)
  session_mode: london_newyork
  allow_london: true
  allow_newyork: true
  allow_asia: false

  symbols:
    BTCUSDm:
      session_mode: 24x7
      trend_adx_min: 26
      meanrev_adx_max: 20
      sl_atr_trend: 2.0
      tp_atr_trend: 2.8
      sl_atr_meanrev: 1.5
      tp_atr_meanrev: 2.2
      min_rr: 1.35

us30_supply_demand:
  atr_period: 14
  rsi_period: 14
  lookback_bars: 24
  impulse_bars: 3
  min_impulse_atr: 1.4
  zone_buffer_atr: 0.10
  sl_buffer_atr: 0.20
  rr_target: 2.0
  min_rr: 1.4
  wick_reject_ratio: 0.35
  min_bars_between_signals: 3
  allow_london: true
  allow_newyork: true

us30_open_wick:
  atr_period: 14
  rsi_period: 14
  newyork_open_hour_utc: 13
  newyork_open_minute_utc: 30
  preopen_lookback_bars: 24
  wick_reject_ratio: 0.45
  sl_buffer_atr: 0.18
  rr_target: 2.2
  min_rr: 1.6
  min_bars_between_signals: 12
  allow_london: false
  allow_newyork: true

us30_trend_pullback:
  atr_period: 14
  rsi_period: 14
  wick_reject_ratio: 0.40
  sl_buffer_atr: 0.22
  rr_target: 2.0
  min_rr: 1.4
  min_trend_slope_atr: 0.04
  min_ma_separation_atr: 0.12
  min_bars_between_signals: 3
  allow_london: true
  allow_newyork: true

us30_asia_eq:
  atr_period: 14
  rsi_period: 14
  asia_start_hour_utc: 1
  asia_end_hour_utc: 6
  eq_buffer_atr: 0.18
  sweep_buffer_atr: 0.12
  sl_buffer_atr: 0.20
  rr_target: 2.0
  min_rr: 1.3
  min_bars_between_signals: 6
  allow_london: true
  allow_newyork: true

us30_fib_retrace:
  atr_period: 14
  rsi_period: 14
  swing_lookback: 30
  pullback_floor: 0.382
  pullback_ceiling: 0.618
  round_number_step: 100.0
  round_number_buffer_atr: 0.35
  sl_buffer_atr: 0.22
  rr_target: 2.2
  min_rr: 1.5
  min_bars_between_signals: 3
  allow_london: true
  allow_newyork: true

ger30_three_pin_breakout:
  atr_period: 14
  rsi_period: 14
  sl_buffer_atr: 0.22
  wick_reject_ratio: 0.35
  rr_target: 1.8
  min_rr: 1.4
  min_bars_between_signals: 4
  allow_london: true
  allow_newyork: false
  breakout_lookback_bars: 12
  impulse_bars: 4
  min_impulse_atr: 1.35
  retest_buffer_atr: 0.10
  min_trend_slope_atr: 0.035
  trend_rsi_buy_min: 53.0
  trend_rsi_sell_max: 47.0
  breakout_body_min_atr: 0.22
  breakout_hold_buffer_atr: 0.05
  max_retest_depth_atr: 0.06

btc_bos_retest:
  atr_period: 14
  rsi_period: 14
  trend_fast_period: 21
  trend_slow_period: 50
  trend_slope_bars: 4
  min_trend_slope_atr: 0.02
  trend_rsi_buy_min: 51.0
  trend_rsi_sell_max: 49.0
  sl_buffer_atr: 0.32
  rr_target: 2.0
  min_rr: 1.4
  wick_reject_ratio: 0.28
  min_bars_between_signals: 3
  allow_london: true
  allow_newyork: true
  allow_asia: false
  bos_lookback: 72
  bos_retest_buffer_atr: 0.08
  bos_break_buffer_atr: 0.15
  bos_liquidity_buffer_atr: 0.12

risk:
  max_trades_per_day: 30
  max_daily_loss: 0.02
  max_open_positions: 5

breakeven:
  enabled: true
  # Trigger when price moves in your favor by trigger_r * initial_R (entry->SL distance)
  trigger_r: 0.60
  # Set SL to entry +/- offset (in points). This helps cover spread/fees.
  offset_points: 10
  # Also consider current spread when choosing offset.
  offset_spread_mult: 1.0
  # Extra safety: require at least this move (in points) before breakeven
  min_move_points: 30

news_filter:
  enabled: true
  blackout_minutes_before: 15
  blackout_minutes_after: 10
  min_impact: high
  poll_interval_seconds: 3600
  fmp_api_key: ""

small_account:
  enabled: true
  threshold_balance: 500
  max_total_risk: 0.02
  max_open_bot_positions: 3
  block_new_entries_with_open_bot_position: true
  max_lot_risk_multiplier: 2.0
  min_equity_balance_ratio: 0.92

production_safety:
  min_candles_required: 80
  startup_history_bars: 120
  max_candle_age_factor: 3.0
  max_spread_to_bar_range: 0.50
  spread_range_lookback_bars: 12
  max_spread_to_sl_ratio: 0.20
  max_symbol_failures: 3
  symbol_cooldown_minutes: 30
  symbol_kill_switches: []
  symbol_max_spread_points: {}
  max_spread_points_default:
  block_new_entries_with_pending_bot_order: true
  block_new_entries_with_open_bot_position: false
  max_open_bot_positions: 5
  min_equity_balance_ratio: 0.90
  min_free_margin_ratio: 0.25
  reconcile_retries: 4
  reconcile_sleep_ms: 250

rotation:
  enabled: true
  frequency_days: 30
  min_trades_required: 20
  rollback_drawdown_pct: 0.05
  top_winners: 1
  selected_strategies: {}
  selected_execution: {}
  symbols:
    XAUUSDm:
      top_winners: 2
      candidates:
        - strategy: xau_liquidity_reclaim
          timeframe: M5
          candle_seconds: 300
          risk: 0.005
          bars: 5000
          min_trades: 20
        - strategy: xau_opening_range_displacement
          timeframe: H1
          candle_seconds: 3600
          risk: 0.005
          bars: 3000
          min_trades: 15
        - strategy: xau_sweep
          timeframe: M30
          candle_seconds: 1800
          risk: 0.005
          bars: 4000
          min_trades: 20
        - strategy: xau_regime
          timeframe: H1
          candle_seconds: 3600
          risk: 0.005
          bars: 3000
          min_trades: 15
    US30m:
      top_winners: 2
      candidates:
        - strategy: us30_asia_eq
          timeframe: M5
          candle_seconds: 300
          risk: 0.001
          bars: 5000
          min_trades: 5
        - strategy: us30_open_wick
          timeframe: M5
          candle_seconds: 300
          risk: 0.001
          bars: 5000
          min_trades: 5
        - strategy: us30_supply_demand
          timeframe: M30
          candle_seconds: 1800
          risk: 0.001
          bars: 4000
          min_trades: 5
        - strategy: us30_fib_retrace
          timeframe: H1
          candle_seconds: 3600
          risk: 0.001
          bars: 3000
          min_trades: 5
    DE30m:
      top_winners: 1
      candidates:
        - strategy: ger30_three_pin_breakout
          timeframe: M30
          candle_seconds: 1800
          risk: 0.003
          bars: 4000
          min_trades: 3
    BTCUSDm:
      top_winners: 2
      candidates:
        - strategy: btc_bos_retest
          timeframe: M5
          candle_seconds: 300
          risk: 0.0015
          bars: 6000
          min_trades: 5
        - strategy: multi_asset_regime
          timeframe: M5
          candle_seconds: 300
          risk: 0.0015
          bars: 6000
          min_trades: 10

session:
    allow_london: true
    allow_newyork: true

walkforward:
    # Evaluate the new US30 playbooks side by side on the same market data.
    symbol: US30m
    timeframe: M5
    strategies:
      - us30_open_wick
      - us30_asia_eq
      - us30_trend_pullback
      - us30_supply_demand
      - us30_fib_retrace
    train_bars: 6000
    test_bars: 2000
    step_bars: 2000
    min_trades: 10
    bars: 20000

backtest:
    period_days: 90
    min_trades: 25
