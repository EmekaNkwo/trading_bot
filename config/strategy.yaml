strategy:
  name: xau_trend
  ema_fast: 50
  ema_slow: 200
  atr:
    period: 14
    sl_multiplier: 2.0
    rr_ratio: 2.5

scalper:
  ema_period: 20
  bb_period: 20
  bb_std: 2.0
  atr_period: 14
  sl_atr: 1.5
  tp_atr: 2.0
  min_candles: 50
  max_spread_points: 30
  news_exclude_before: 15
  news_exclude_after: 15
  trailing_stop: true
  trailing_atr_multiplier: 1.0
  trailing_step: 0.5

risk:
  max_trades_per_day: 3
  max_daily_loss: 0.02
  max_open_positions: 1

rotation:
  enabled: true
  frequency_days: 30
  min_trades_required: 20
  rollback_drawdown_pct: 0.05

session:
    allow_london: true
    allow_newyork: true

backtest:
    period_days: 90
    min_trades: 25